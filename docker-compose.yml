services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: example-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  consumer:
    build:
      context: .
      dockerfile: src/RabbibMQ.Consumer/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
    depends_on:
      rabbitmq:
        condition: service_healthy

  producer:
    build:
      context: .
      dockerfile: src/RabbitMQ.Producer/Dockerfile
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      QUANTIDADE_PEDIDOS: 3
      AUTO_SEND: "true"
    depends_on:
      rabbitmq:
        condition: service_healthy
